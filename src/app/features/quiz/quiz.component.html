<main class="mx-auto grid max-w-7xl gap-8 p-4 md:p-8 lg:grid-cols-[320px_1fr]">
    <aside class="space-y-5">
        <header>
            <span class="badge badge-primary">Quiz</span>
            <h1 class="mt-3 text-3xl font-semibold tracking-tight text-[#202124]">Practice by topic.</h1>
            <p class="mt-2 text-sm text-[#5F6368]">Choose a topic, answer focused questions, and review your score.</p>
        </header>

        <section class="edudash-card space-y-3">
            @for (topic of topics; track topic.name) {
                <button class="w-full rounded-lg border border-[#E0E0E0] bg-white p-3 text-left transition-colors hover:bg-[#F8F9FA]" [class.border-[#1A73E8]]="topic.name === 'Angular'">
                    <div class="flex items-center justify-between text-sm font-semibold">
                        <span>{{ topic.name }}</span>
                        <span class="text-[#5F6368]">{{ topic.count }}</span>
                    </div>
                    <div class="mt-2 h-1.5 rounded-full bg-[#E0E0E0]">
                        <div class="h-1.5 rounded-full bg-[#1A73E8]" [style.width.%]="topic.readiness"></div>
                    </div>
                </button>
            }
        </section>
    </aside>

    <section class="edudash-card">
        <div class="mb-6 flex flex-col gap-4 border-b border-[#E0E0E0] pb-5 md:flex-row md:items-center md:justify-between">
            <div>
                <span class="badge badge-neutral">Question 3 of 12</span>
                <h2 class="mt-3 text-2xl font-semibold text-[#202124]">When should you use Angular signals?</h2>
            </div>
            <div class="rounded-lg bg-[#e8f0fe] p-3 text-[#1A73E8]">
                <lucide-icon name="timer" [size]="22"></lucide-icon>
            </div>
        </div>

        <div class="space-y-3">
            @for (choice of choices; track choice) {
                <button class="w-full rounded-xl border border-[#E0E0E0] bg-white p-4 text-left text-sm font-medium text-[#202124] transition-all hover:border-[#1A73E8] hover:bg-[#F8F9FA]">
                    {{ choice }}
                </button>
            }
        </div>

        <div class="mt-8 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <button class="btn btn-secondary">
                <lucide-icon name="arrow-left" [size]="16"></lucide-icon>
                Previous
            </button>
            <button class="btn btn-primary">
                Submit Answer
                <lucide-icon name="arrow-right" [size]="16"></lucide-icon>
            </button>
        </div>
    </section>
</main>
