<div class="block max-w-6xl mx-auto p-4 md:p-8 space-y-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center pb-6 border-b border-[#E0E0E0]">
        <div>
            <div class="flex items-center gap-2 mb-2">
                <app-badge type="primary" text="Interview Preparation"></app-badge>
                <span class="text-[#5F6368] text-sm font-medium">Auto-saved to local storage</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-[#202124]" contenteditable="true"
                (blur)="onTitleChange($event)">{{ title }}</h1>
        </div>
        <button (click)="resetData()"
            class="mt-4 md:mt-0 btn bg-[#fce8e6] text-[#c5221f] hover:bg-[#fad2cf] border-transparent transition-colors">
            <lucide-icon name="trash-2" [size]="16"></lucide-icon> Reset Data
        </button>
    </header>

    <!-- JD vs Resume Checklist -->
    <section class="edudash-card p-6 md:p-8">
        <div class="flex items-center gap-2 mb-4">
            <div class="p-1.5 rounded-lg bg-[#e8f0fe] text-[#1A73E8]">
                <lucide-icon name="arrow-left-right" [size]="20"></lucide-icon>
            </div>
            <h2 class="text-xl font-semibold text-[#202124]">JD vs Resume Alignment</h2>
        </div>
        <app-jd-resume-checklist></app-jd-resume-checklist>
    </section>

    <!-- Pitch & Strategy -->
    <section class="edudash-card p-6 md:p-8">
        <div class="flex flex-col mb-6">
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 rounded-lg bg-[#e8f0fe] text-[#1A73E8]">
                        <lucide-icon name="brain" [size]="20"></lucide-icon>
                    </div>
                    <h2 class="text-xl font-semibold text-[#202124]">Pitch & Execution Strategy</h2>
                </div>
                <span class="text-xs text-[#5F6368] font-medium hidden md:block">Click text to edit directly</span>
            </div>
            <div class="flex justify-end mb-1 mt-2">
                <span class="text-xs font-bold text-[#34A853]">0/3</span>
            </div>
            <div class="w-full bg-[#E0E0E0] rounded-full h-1.5">
                <div class="bg-[#34A853] h-1.5 rounded-full progress-fill" style="width: 0%"></div>
            </div>
        </div>
        <app-pitch-strategy></app-pitch-strategy>
    </section>

    <!-- Q&A Section -->
    <section class="edudash-card p-6 md:p-8">
        <div class="flex flex-col mb-8">
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-2">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 rounded-lg bg-[#e8f0fe] text-[#1A73E8]">
                        <lucide-icon name="message-square" [size]="20"></lucide-icon>
                    </div>
                    <h2 class="text-xl font-semibold text-[#202124]">High-Probability Questions</h2>
                </div>
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <button (click)="openImportModal()" class="btn btn-secondary flex-1 md:flex-none">
                        <lucide-icon name="upload" [size]="16"></lucide-icon> Import
                    </button>
                    <button (click)="addQA()" class="btn btn-primary flex-1 md:flex-none">
                        <lucide-icon name="plus" [size]="16"></lucide-icon> Add Q&A
                    </button>
                </div>
            </div>
            <div class="flex justify-end mb-1 mt-2">
                <span class="text-xs font-bold text-[#34A853]">0/0</span>
            </div>
            <div class="w-full bg-[#E0E0E0] rounded-full h-1.5">
                <div class="bg-[#34A853] h-1.5 rounded-full progress-fill" style="width: 0%"></div>
            </div>
        </div>
        <app-qa-accordion></app-qa-accordion>
    </section>

    <!-- Keywords Section -->
    <section class="edudash-card p-6 md:p-8">
        <div class="flex flex-col mb-8">
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-2">
                <div class="flex items-center gap-2">
                    <div class="p-1.5 rounded-lg bg-[#e8f0fe] text-[#1A73E8]">
                        <lucide-icon name="key" [size]="20"></lucide-icon>
                    </div>
                    <h2 class="text-xl font-semibold text-[#202124]">Keyword Cheat Sheet</h2>
                </div>
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <button (click)="addKeyword()" class="btn btn-primary flex-1 md:flex-none">
                        <lucide-icon name="plus" [size]="16"></lucide-icon> Add Keyword
                    </button>
                </div>
            </div>
            <div class="flex justify-end mb-1 mt-2">
                <span class="text-xs font-bold text-[#34A853]">0/0</span>
            </div>
            <div class="w-full bg-[#E0E0E0] rounded-full h-1.5">
                <div class="bg-[#34A853] h-1.5 rounded-full progress-fill" style="width: 0%"></div>
            </div>
        </div>
        <app-keyword-card></app-keyword-card>
    </section>
</div>
