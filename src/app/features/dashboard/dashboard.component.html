<div class="block max-w-7xl mx-auto p-6 md:p-8 space-y-8">
    <header class="space-y-1">
        <h1 class="text-2xl font-semibold text-[#202124]">Welcome back, Praveen</h1>
        <p class="text-[#5F6368] text-sm">Here is your progress for today. Keep up the momentum!</p>
    </header>

    <!-- Top Stat Row -->
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <app-stat-card [data]="questionsStat"></app-stat-card>
        <app-streak-counter></app-streak-counter>
        <app-stat-card [data]="topicsStat"></app-stat-card>
        <app-stat-card [data]="accuracyStat"></app-stat-card>
    </section>

    <!-- Main Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Left Column: Continue Learning & Heatmap -->
        <div class="lg:col-span-2 space-y-8">
            <app-continue-learning></app-continue-learning>
            
            <section class="flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-[#202124]">Activity History</h2>
                    <div class="flex gap-2">
                        <div class="flex bg-white border border-[#E0E0E0] p-0.5 rounded-lg">
                            <button (click)="changeHeatmapLayout('vertical')" 
                                [class]="heatmapConfig.layout === 'vertical' ? 'text-[#202124] bg-[#F8F9FA] shadow-sm' : 'text-[#5F6368] hover:text-[#202124]'"
                                class="px-3 py-1 rounded-md text-xs font-medium transition-all">90-Day</button>
                            <button (click)="changeHeatmapLayout('horizontal')"
                                [class]="heatmapConfig.layout === 'horizontal' ? 'text-[#202124] bg-[#F8F9FA] shadow-sm' : 'text-[#5F6368] hover:text-[#202124]'"
                                class="px-3 py-1 rounded-md text-xs font-medium transition-all">Yearly</button>
                        </div>
                        <div class="flex bg-white border border-[#E0E0E0] p-0.5 rounded-lg">
                            <button (click)="changeHeatmapShape('square')"
                                [class]="heatmapConfig.shape === 'square' ? 'text-[#202124] bg-[#F8F9FA] shadow-sm' : 'text-[#5F6368] hover:text-[#202124]'"
                                class="px-3 py-1 rounded-md text-xs font-medium transition-all">Squares</button>
                            <button (click)="changeHeatmapShape('circle')"
                                [class]="heatmapConfig.shape === 'circle' ? 'text-[#202124] bg-[#F8F9FA] shadow-sm' : 'text-[#5F6368] hover:text-[#202124]'"
                                class="px-3 py-1 rounded-md text-xs font-medium transition-all">Dots</button>
                        </div>
                    </div>
                </div>
                <app-activity-heatmap [config]="heatmapConfig"></app-activity-heatmap>
            </section>
        </div>

        <!-- Right Sidebar: Radar & Skill Tree snippet -->
        <div class="lg:col-span-1 space-y-8">
            <app-radar-chart></app-radar-chart>
            <!-- Skill tree snippet can go here eventually -->
        </div>
    </div>
</div>
