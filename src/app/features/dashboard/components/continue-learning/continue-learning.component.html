<section>
    <h2 class="text-lg font-semibold text-[#202124] mb-4">Continue Learning</h2>
    <div class="edudash-card border-l-4 border-l-[#1A73E8] flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
        <div class="space-y-2 flex-1">
            <div class="flex items-center gap-2">
                <app-badge type="primary" text="System Design"></app-badge>
                <app-badge type="warning" text="High Priority"></app-badge>
            </div>
            <h3 class="text-xl font-semibold text-[#202124]">Handling 500+ Concurrent Connections</h3>
            <p class="text-sm text-[#5F6368] max-w-xl line-clamp-2">Review caching strategies and
                database connection pooling to achieve sub-50ms latency under load.</p>
        </div>
        <div class="shrink-0 flex gap-3 w-full md:w-auto">
            <button class="btn btn-secondary w-full md:w-auto">Review Notes</button>
            <button class="btn btn-primary w-full md:w-auto">Resume <lucide-icon name="play" [size]="16"></lucide-icon></button>
        </div>
    </div>
</section>
